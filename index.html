<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>Life RPG v1.2</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="container" class="game-container">
        <div id="auth-section" class="auth-overlay">
            <div class="auth-box">
                <h2>✨ Life RPG</h2>
                <p style="color:#a1a1aa; font-size:13px; margin-top:-20px; margin-bottom:25px;">나의 일상을 퀘스트로!</p>

                <button onclick="loginWithGoogle()" class="google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20"
                        style="margin-right: 10px; background-color: white; border-radius: 50%;">
                    Google 계정으로 시작하기
                </button>

                <button onclick="startGuestModeWithWarning()" class="guest-btn"
                    style="margin-top: 10px; background-color: transparent; border: 1px solid #30363d; color: #8b949e; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer;">
                    가입 없이 체험하기
                </button>

                <p id="auth-msg" style="font-size:12px; color:var(--red); margin-top:15px;"></p>
            </div>
        </div>

        <div id="main-game" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>
                    <button type="button" class="logout-btn" onclick="logout()">로그아웃</button>
                    <button type="button" onclick="showRanking()" class="rank-btn">랭킹</button>
                </div>
                <button type="button" class="reset-btn" onclick="resetGame()">초기화</button>
            </div>
            <p id="guest-notice"
                style="display:none; color:#8b949e; font-size:12px; text-align:center; margin:-5px 0 15px;">게스트 모드입니다.
                데이터가 저장되지 않습니다.</p>

            <div class="profile-box">
                <div id="profile-view">
                    <h2 id="p-name">플레이어</h2>
                    <p id="p-bio" class="bio-text">로딩 중...</p>
                    <button type="button" onclick="toggleProfileEdit()" class="small-btn">수정</button>
                </div>
                <div id="profile-edit" style="display:none;">
                    <input type="text" id="edit-name" placeholder="닉네임"><br>
                    <input type="text" id="edit-bio" placeholder="한 줄 다짐" style="margin: 8px 0;"><br>
                    <button type="button" onclick="saveProfile()" class="save-btn">저장</button>
                </div>
                <div id="p-rank" class="rank-display" style="margin-top: 10px; font-weight: bold; color: var(--gold);">RANK: F</div>
                
                <div class="status-bar" style="position:relative; background:#18181b; height:18px; border-radius:10px; margin:15px 0; overflow:hidden; border:1px solid var(--border);">
                    <div id="exp-bar" class="exp-fill" style="height:100%; width:0%; transition: width 0.5s;"></div>
                    <div id="exp-text" style="position:absolute; top:0; left:0; width:100%; height:100%; text-align:center; font-size:11px; line-height:18px; color:#fff; font-weight:bold; text-shadow:0px 1px 2px rgba(0,0,0,0.8);">0% (0/100)</div>
                </div>
                
                <div class="stats-text">LV <span id="lv">1</span> | 골드 <span id="gold">0</span>G</div>
            </div>

            <!-- 🌟 탭 이름 '주/월'로 수정 -->
            <div class="tab-menu">
                <button type="button" class="tab-btn active" onclick="setTab('일간', event)">일간</button>
                <button type="button" class="tab-btn" onclick="setTab('주/월', event)">주/월</button>
                <button type="button" class="tab-btn" onclick="setTab('년간', event)">년간</button>
            </div>

            <div class="input-group">
                <input type="text" id="q-input" placeholder="새로운 할 일...">
                <select id="q-diff" style="flex:0.2; display:none;" disabled>
                    <option value="쉬움">쉬움</option>
                </select>
                <button type="button" id="q-repeat-btn" onclick="toggleRepeat()" style="flex: 0 0 65px; background:transparent; border:1px solid var(--border); color:#a1a1aa; border-radius:12px; font-size:12px; padding:0; transition:0.2s;">1회성</button>
                <button type="button" onclick="addQuest()" class="add-btn">+</button>
            </div>
            <div id="q-list" class="list-container"></div>

            <div class="shop-section" style="margin-top: 30px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0; color:var(--gold);">🎁 나를 위한 보상</h3>
                    <button type="button" onclick="suggestReward()" class="suggest-btn">추천</button>
                </div>
                <div class="input-group">
                    <input type="text" id="s-input" placeholder="치킨 사먹기, 쇼핑 등">
                    <input type="number" id="s-price" placeholder="G" style="flex:0.4;" min="1" inputmode="numeric">
                    <button type="button" onclick="addShopItem()" class="shop-add-btn">등록</button>
                </div>
                <div id="s-list" class="list-container"></div>
            </div>

            <div style="margin-top: 25px; text-align: center;">
                <button type="button" onclick="showHistory()" style="background: transparent; border: 1px dashed var(--border); color: #a1a1aa; padding: 10px 20px; border-radius: 12px; width: 100%; font-size: 13px;">
                    📜 활동 기록 열어보기
                </button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 30px; padding-top: 15px; border-top: 1px dashed #30363d;">
                <div style="display:flex; gap:10px;">
                    <a href="privacy.html" style="color:#8b949e; font-size:11px; text-decoration:underline;">개인정보 처리방침</a>
                    <a href="account-deletion.html" style="color:#8b949e; font-size:11px; text-decoration:underline;">계정삭제 안내</a>
                </div>
                <button type="button" onclick="deleteAccount()" style="background:none; border:none; color:var(--red); font-size:11px; cursor:pointer; text-decoration:underline;">계정 삭제</button>
            </div>
        </div>

        <div id="ranking-modal" class="auth-overlay" style="display:none; flex-direction:column;">
            <div class="auth-box ranking-card">
                <h2 style="color:var(--gold); margin-bottom:15px;">명예의 전당</h2>
                <div id="ranking-list" style="text-align:left;"></div>
                <button type="button" onclick="closeRanking()" class="close-btn" style="margin-top: 15px; background: var(--border); border: none; color: white; padding: 10px 20px; border-radius: 8px;">닫기</button>
            </div>
        </div>

        <div id="history-modal" class="auth-overlay" style="display:none; flex-direction:column;">
            <div class="auth-box history-card" style="max-height: 80vh; display: flex; flex-direction: column;">
                <h2 style="color:var(--text); margin-bottom:15px; font-size:18px;">📜 나의 활동 기록</h2>
                <div id="history-list" style="text-align:left; overflow-y:auto; flex: 1; padding-right:5px; font-size:13px; color:#a1a1aa; line-height: 1.6;"></div>
                <button type="button" onclick="closeHistory()" style="margin-top: 15px; background: var(--border); border: none; color: white; padding: 10px 20px; border-radius: 8px;">닫기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
