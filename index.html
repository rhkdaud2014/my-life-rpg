<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life RPG v0.9</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="container" class="game-container">
        <div id="auth-section" class="auth-overlay">
            <div class="auth-box">
                <h2>✨ Life RPG</h2>
                <p style="color:#8b949e; font-size:13px; margin-top:-20px; margin-bottom:25px;">나의 인생을 레벨업 하세요</p>
                <input type="email" id="auth-email" placeholder="이메일 주소">
                <input type="password" id="auth-pw" placeholder="비밀번호">
                <div class="auth-btns">
                    <button onclick="handleAuth('signup')" class="signup-btn">회원가입</button>
                    <button onclick="handleAuth('login')" class="login-btn">로그인</button>
                </div>
                <p id="auth-msg" style="font-size:12px; color:var(--red); margin-top:15px;"></p>
            </div>
        </div>

        <div id="main-game" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div>
                    <button class="logout-btn" onclick="logout()">로그아웃</button>
                    <button onclick="showRanking()" class="rank-btn">🏆 랭킹</button>
                </div>
                <button class="reset-btn" onclick="resetGame()">초기화</button>
            </div>

            <div class="profile-box">
                <div id="profile-view">
                    <h2 id="p-name">👤 플레이어</h2>
                    <p id="p-bio" class="bio-text">로딩 중...</p>
                    <button onclick="toggleProfileEdit()" class="small-btn">수정</button>
                </div>
                <div id="profile-edit" style="display:none;">
                    <input type="text" id="edit-name" placeholder="닉네임"><br>
                    <input type="text" id="edit-bio" placeholder="한줄 다짐"><br>
                    <button onclick="saveProfile()" class="save-btn">저장</button>
                </div>
                <div id="p-rank" class="rank-display">RANK: F</div>
                <div class="status-bar"><div id="exp-bar" class="exp-fill"></div></div>
                <div class="stats-text">LV <span id="lv">1</span> | 💰 <span id="gold">0</span>G</div>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" onclick="setTab('일간', event)">일간</button>
                <button class="tab-btn" onclick="setTab('주간', event)">주간</button>
                <button class="tab-btn" onclick="setTab('연간', event)">연간</button>
            </div>

            <div class="input-group">
                <input type="text" id="q-input" placeholder="새로운 도전...">
                <select id="q-diff" style="flex:0.4;" disabled>
                    <option value="쉬움">쉬움</option>
                    <option value="보통">보통</option>
                    <option value="어려움">어려움</option>
                </select>
                <button onclick="addQuest()" class="add-btn">+</button>
            </div>
            <div id="q-list" class="list-container"></div>

            <div class="shop-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0; color:var(--gold);">🛒 상점</h3>
                    <button onclick="suggestReward()" class="suggest-btn">🎲 추천</button>
                </div>
                <div class="input-group">
                    <input type="text" id="s-input" placeholder="보상 이름">
                    <input type="number" id="s-price" placeholder="G" style="flex:0.4;">
                    <button onclick="addShopItem()" class="shop-add-btn">등록</button>
                </div>
                <div id="s-list" class="list-container"></div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 30px; padding-top: 15px; border-top: 1px dashed #30363d;">
                <button onclick="deleteAccount()" style="background:none; border:none; color:var(--red); font-size:11px; cursor:pointer; text-decoration:underline;">계정 탈퇴</button>
            </div>
        </div>

        <div id="ranking-modal" class="auth-overlay" style="display:none; flex-direction:column;">
            <div class="auth-box ranking-card">
                <h2 style="color:var(--gold); margin-bottom:15px;">🏆 명예의 전당</h2>
                <div id="ranking-list" style="text-align:left;"></div>
                <button onclick="closeRanking()" class="close-btn">닫기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
